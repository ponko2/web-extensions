packages:
  - packages/*
allowBuilds:
  esbuild: true
  spawn-sync: true
catalog:
  "@commitlint/cli": 20.5.0
  "@commitlint/config-conventional": 20.5.0
  "@commitlint/types": 20.5.0
  "@tsconfig/strictest": 2.0.8
  "@types/node": 24.12.0
  "@wxt-dev/storage": ^1.2.8
  ts-extras: ^0.19.0
  typescript: 6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: 0.1.14
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  wxt: 0.20.20
catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
