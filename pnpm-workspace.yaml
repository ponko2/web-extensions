packages:
  - packages/*
allowBuilds:
  esbuild: true
  spawn-sync: true
catalog:
  "@commitlint/cli": 20.5.0
  "@commitlint/config-conventional": 20.5.0
  "@commitlint/types": 20.5.0
  "@tsconfig/strictest": 2.0.8
  "@types/node": 24.12.2
  "@wxt-dev/storage": ^1.2.8
  typescript: 6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.1.18
  vite-plus: 0.1.18
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.18
  wxt: 0.20.25
catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
